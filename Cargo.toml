[package]
name = "jhana-rs"
version = "0.1.0"
edition = "2024"
description = "Voice-driven meditation guide for Radxa Rock 5A (aarch64)"
license = "MIT"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
log = "0.4"
simplelog = "0.12"
signal-hook = "0.3"
llama-cpp-2 = "0.1"
llama-gguf = "0.14"
encoding_rs = "0.8"

[lints.rust]
# unsafe_code relaxed from "forbid" to "warn" because llama-cpp-2 requires
# unsafe FFI calls to the underlying llama.cpp C++ library.
unsafe_code = "warn"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
