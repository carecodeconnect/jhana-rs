[package]
name = "jhana-rs"
version = "0.1.0"
edition = "2024"
description = "Voice-driven meditation guide for Radxa Rock 5A (aarch64)"
license = "MIT"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
log = "0.4"
