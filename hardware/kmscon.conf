# /etc/kmscon/kmscon.conf — kmscon configuration for jhana-rs.
#
# Installed by `scripts/rock-kmscon-setup.sh`. The font choice matters:
# we need a monospaced TTF with good unicode coverage of the quadrant
# block characters (▘▝▖▗▀▄▌▐█) so `tui-big-text` renders correctly.
#
# DejaVu Sans Mono ships with Ubuntu, has full Unicode block coverage,
# and is the de-facto kmscon default. JetBrains Mono and Iosevka are
# nicer-looking alternatives if you've installed them on the device.

# TTF font path or font name from fontconfig
font-name=Monospace
# Roughly matches the Uni3-TerminusBold32x16 console-font scale on
# the 720×1280 portrait display — about 45 columns wide, 40 rows tall.
font-size=24

# DRM/KMS backend — direct hardware framebuffer, no X/Wayland needed.
# Panfrost provides the GBM bits on RK3588.
drm
hwaccel

# Don't expose VT-switch keys (Ctrl-Alt-F1..F6) — this is an appliance.
no-switchvt

# Palette: use the kmscon-soft palette as a base. Foreground/background
# can be overridden but jhana-rs sets its own colours via ratatui.
palette=soft

# Cursor: hide. The meditation surface has no input cursor.
no-pad
