# /etc/kmscon/kmscon.conf — kmscon configuration for jhana-rs.
#
# Installed by `scripts/rock-kmscon-setup.sh`. Format: one option per
# line, long-name flag without the `--` prefix. Boolean options take
# no value; prefix with `no-` to disable.
#
# Validated against kmscon 9.0.0 (Armbian Ubuntu 24.04).

# Font: monospace from fontconfig (DejaVu Sans Mono on Ubuntu).
# size=24 fits ~30 cols across the 720×1280 portrait display.
font-engine=pango
font-name=Monospace
font-size=24

# Video: DRM/KMS with optional Panfrost 3D accel. Falls back to
# software rendering if hwaccel can't open the GPU.
drm
hwaccel

# Terminal: advertise full xterm features so ratatui gets 24-bit
# colour, cursor positioning, and modern keymaps.
term=xterm-256color
